<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>KCN Map - GIS Project</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .legend {
            background: white;
            padding: 10px;
            line-height: 18px;
            color: #555;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // Thiết lập vùng nhìn ban đầu (tọa độ khu vực Sơn Tây/Ba Vì dựa trên dữ liệu SQL)
    const map = L.map('map').setView([21.13, 105.45], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    fetch('/all')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                // Xử lý hiển thị cho kiểu dữ liệu POINT (Bãi rác)
                pointToLayer: function (feature, latlng) {
                    if (feature.properties.layer === "garbadge") {
                        return L.circleMarker(latlng, {
                            radius: 8,
                            fillColor: "#ff7800", // Màu cam bãi rác
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        });
                    }
                },
                // Định dạng màu sắc cho các đường và vùng
                style: function (feature) {
                    switch (feature.properties.layer) {
                        case 'road':
                            return { color: 'blue', weight: 3 };
                        case 'building':
                            return { color: 'gray', weight: 1, fillOpacity: 0.5 };
                        case 'bounds':
                            return { color: 'red', weight: 2, dashArray: '5, 5', fillOpacity: 0 };
                        case 'instruction-generated':
                            return { color: 'green', weight: 2 };
                        default:
                            return { color: 'black', weight: 1 };
                    }
                },
                // Thêm thông tin khi nhấn vào đối tượng
                onEachFeature: function (feature, layer) {
                    let label = feature.properties.layer;
                    if (label === 'garbadge') label = "Vị trí bãi rác";
                    layer.bindPopup("<b>Lớp dữ liệu:</b> " + label);
                }
            }).addTo(map);
        })
        .catch(err => console.error("Lỗi tải dữ liệu:", err));
</script>

</body>
</html>
