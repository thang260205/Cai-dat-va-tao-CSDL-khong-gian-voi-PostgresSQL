<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>KCN Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{
height:100%;
margin:0;
}

#map{
height:100%;
width:100%;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([21.0285,105.8542],15)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

fetch('/all')
.then(res=>res.json())
.then(data=>{

L.geoJSON(data,{

style:function(feature){

if(feature.properties.layer==="road"){
return {weight:3}
}

if(feature.properties.layer==="building"){
return {weight:1}
}

if(feature.properties.layer==="bounds"){
return {weight:2,dashArray:"5,5"}
}

if(feature.properties.layer==="garbadge"){
return {weight:2}
}

return {}
}

}).addTo(map)

})

</script>

</body>
</html>
